<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Range Generator | Numero-Vibe</title>
    <style>
        /* (Use the same CSS variables as above for branding) */
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 50px; text-align: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #d4af37; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Custom Range Tool</h2>
        <p>Define your own numerical boundaries.</p>
        <input type="number" id="min" placeholder="Min Value (e.g. 1)">
        <input type="number" id="max" placeholder="Max Value (e.g. 100)">
        <input type="number" id="count" placeholder="How many numbers?">
        <button onclick="generate()">Calculate Custom Resonance</button>
        <div id="res" style="margin-top:20px; font-size:24px; font-weight:bold; color:#d4af37;"></div>
    </div>
    <p><a href="index.html" style="color:white">Back to Home</a></p>

    <script>
        function generate() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);
            const count = parseInt(document.getElementById('count').value);
            const out = document.getElementById('res');
            
            if(count > (max - min)) return alert("Range too small for unique numbers!");

            let nums = [];
            while(nums.length < count) {
                let r = Math.floor(Math.random() * (max - min + 1)) + min;
                if(!nums.includes(r)) nums.push(r);
            }
            out.innerText = nums.sort((a,b)=>a-b).join(" - ");
        }
    </script>
</body>
</html>
