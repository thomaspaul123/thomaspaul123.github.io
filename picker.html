<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Picker | ARTHER Analytics</title>
	<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7S60KVJZH9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7S60KVJZH9');

    <style>
        :root { --bg: #0b0f19; --card: #151c2c; --accent: #d4af37; --gold-grad: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%); --text: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        nav { background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        nav a { text-decoration: none; color: #1e293b; font-weight: bold; margin-left: 20px; font-size: 13px; text-transform: uppercase; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; max-width: 500px; margin: 3rem auto; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; outline: none; }
        label { display: block; text-align: left; font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        button { width: 100%; padding: 16px; background: var(--gold-grad); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; color: #0b0f19; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .res-tag { display: inline-block; padding: 10px 20px; background: var(--gold-grad); color: #0b0f19; border-radius: 5px; margin: 5px; font-weight: 900; }
        
        /* AI Insight Style */
        .ai-insight { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-top: 20px; font-style: italic; font-size: 13px; color: #d4af37; border-left: 3px solid #d4af37; text-align: left; line-height: 1.4; }

        /* Loader Styles */
        #loader { display: none; text-align: center; margin-top: 20px; }
        .progress-container { width: 100%; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; margin: 15px 0; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold-grad); transition: width 0.2s; }
        .loading-text { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }

        footer { text-align: center; padding: 30px; font-size: 11px; color: var(--text); }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>
<nav>
    <div style="color:var(--accent); font-weight:900; font-size:1.6rem; letter-spacing: 2px;">ARTHER AI</div>
    <div><a href="index.html">Dashboard</a><a href="picker.html">Picker</a><a href="about.html">About</a><a href="feedback.html">Support</a></div>
</nav>

<div class="card">
    <h2>AI Pattern Picker</h2>
    <p style="font-size: 12px; color: var(--text);">Extract fortune numbers from your custom pool using neural heuristics.</p>
    
    <form id="pickerForm" action="https://script.google.com/macros/s/AKfycbx4weEmXcoEMeVxYdb0BZE-SueptHLPIuUi2ok-un_x6idY5o1F_cSaYePaVV-IZBkXSQ/exec" method="POST" target="hidden_iframe" onsubmit="return runAiPicker()">
        <input type="text" id="p_name" name="name" placeholder="FULL NAME" required>
        <input type="email" id="p_email" name="email" placeholder="EMAIL" required>
        <input type="date" id="p_dob" name="dob" required>
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>Mood</label><select name="mood" id="p_mood"><option value="Inspired">Inspired</option><option value="Balanced">Balanced</option><option value="Calm">Calm</option><option value="Energetic">Energetic</option></select></div>
            <div style="flex:1;"><label>Color</label><select name="color" id="p_color"><option value="Gold">Gold</option><option value="Blue">Blue</option><option value="Emerald">Emerald</option><option value="Ruby">Ruby</option></select></div>
        </div>

        <label>Your Number Pool (Comma Separated)</label>
        <textarea id="numList" name="custom_list" rows="3" placeholder="PASTE LIST (e.g. 10, 20, 30...)" required></textarea>
        
        <label>Extraction Quantity (Max 10)</label>
        <input type="number" id="p_limit" name="limit" placeholder="QTY TO PICK (MAX 10)" max="10" required>
        
        <input type="hidden" name="type" value="Picker"><input type="hidden" name="output" id="p_output">
        
        <button type="submit">Retrieve My Pattern</button>
    </form>

    <div id="loader">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="loading-text" id="statusMsg">Reading Pool Data...</p>
    </div>

    <div id="res" style="margin-top:20px; display:none;">
        <div id="outputDisplay"></div>
        <div id="fortuneInsight" class="ai-insight"></div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); width:auto; padding: 10px 20px; font-size:11px; margin-top:15px;">New Extraction</button>
    </div>
</div>

<footer><p>© 2026 ARTHER Analytics </p></footer>
<iframe name="hidden_iframe" id="hidden_iframe"></iframe>

<script>
    // Pull shared user data
    window.onload = () => { 
        const s = JSON.parse(localStorage.getItem('arther_user')); 
        if(s) { 
            document.getElementById('p_name').value = s.name; 
            document.getElementById('p_email').value = s.email; 
            document.getElementById('p_dob').value = s.dob; 
        } 
    };

    function runAiPicker() {
        const name = document.getElementById('p_name').value;
        const dob = document.getElementById('p_dob').value;
        const list = document.getElementById('numList').value;
        const limit = parseInt(document.getElementById('p_limit').value);
        const mood = document.getElementById('p_mood').value;
        const color = document.getElementById('p_color').value;
        
        const pool = list.split(',').map(s => s.trim()).filter(s => s !== "");

        // Validations
        if(pool.length < limit || limit > 10) { 
            alert("Validation Error: Pool too small or quantity exceeds 10."); 
            return false; 
        }
        
        // AI Seed Calculation
        let seed = 0; 
        for(let i=0; i<name.length; i++) seed += name.charCodeAt(i);
        seed += parseInt(dob.replace(/-/g, ''));
        
        const moodWeight = {"Inspired": 1.9, "Balanced": 1.2, "Calm": 0.8, "Energetic": 2.5}[mood];

        // AI Selection Logic
        let selected = []; 
        let tempPool = [...pool];
        while(selected.length < limit && tempPool.length > 0) {
            // Neural logic to pick index instead of pure random
            let shift = Math.abs(Math.sin(seed + selected.length) * moodWeight * 100);
            let aiIdx = Math.floor(shift) % tempPool.length;
            selected.push(tempPool.splice(aiIdx, 1)[0]);
        }

        document.getElementById('p_output').value = selected.join(", ");
        
        // Transition to Loading
        document.getElementById('pickerForm').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let width = 0;
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('statusMsg');
        const stages = ["Parsing Custom Pool...", "Applying Neural Weights...", "Filtering Resonance...", "Finalizing Fortune..."];

        const loadingInt = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadingInt);
                displayResults(selected, mood, color);
            } else {
                width += 2;
                bar.style.width = width + '%';
                if (width < 30) status.innerText = stages[0];
                else if (width < 60) status.innerText = stages[1];
                else if (width < 85) status.innerText = stages[2];
                else status.innerText = stages[3];
            }
        }, 30);

        return true;
    }

    function displayResults(selected, mood, color) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('outputDisplay').innerHTML = selected.map(n => `<div class="res-tag">${n}</div>`).join("");
        
        // Dynamic Fortune Explanation
        const fortunes = {
            "Inspired": `The AI has identified high-frequency resonance in your list. These numbers align with your creative '${mood}' state and the vibrant energy of ${color}.`,
            "Balanced": `Extraction complete. A stable geometric pattern was found within your pool, reflecting a '${mood}' signature harmonized by ${color} frequencies.`,
            "Calm": `Grounding successful. The heuristic engine filtered your pool for low-frequency stability, matching your '${mood}' profile and ${color} resonance.`,
            "Energetic": `High-velocity scan finished! The neural algorithm accelerated through your list to find the most intense fortune points based on your ${color} energy.`
        };

        document.getElementById('fortuneInsight').innerText = fortunes[mood];
        document.getElementById('res').style.display = 'block';
    }
</script>
</body>
</html>
